# CI gate (S-009): runs the test suite on every PR to main, OUTSIDE the
# harness's trust boundary, so a stage agent can neither skip nor misreport
# it. This is the agent-proof half of the safety model; S-010 (improvements
# C3) is the in-harness mirror. Turning this check into a *required* gate is
# a one-time manual branch-protection step documented in README.md.
#
# Runs on ubuntu AND windows: Windows is the harness's real runtime, and some
# bugs are platform-specific (e.g. zoneinfo needs the tzdata package on
# Windows but resolves from system data on Linux — an ubuntu-only gate would
# miss a missing tzdata dep). fail-fast: false so one OS failing still reports
# the other.
name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read # least privilege: no secrets, no write scope

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run the test suite
        run: uv run pytest -q
